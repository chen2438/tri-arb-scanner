name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-message:
    name: Commit message policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate new commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: python scripts/check_commit_messages.py --base "$BASE_SHA" --head "$HEAD_SHA"

  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e . --no-deps
      - name: Ruff
        run: ruff check .
      - name: Verify generated MEXC protobuf
        run: python scripts/generate_mexc_proto.py --check
      - name: Pytest
        run: pytest -vv --tb=short

  frontend:
    name: Frontend and wheel assets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Build distributable wheel
        run: python -m pip wheel .. --no-deps --wheel-dir ../wheelhouse
      - name: Verify packaged dashboard
        run: python ../scripts/check_wheel_contents.py ../wheelhouse/*.whl
